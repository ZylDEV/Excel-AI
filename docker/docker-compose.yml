version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
      - ../core:/core
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  addin:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../addin:/app
    command: sh -c "npm install && npm run dev"
